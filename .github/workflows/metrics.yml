name: Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: vishwakumarv
